apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: saas-pos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: docker.io/library/saas-pos-caddy:initial
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
      volumes:
        - name: caddyfile
          configMap:
            name: caddy-config
