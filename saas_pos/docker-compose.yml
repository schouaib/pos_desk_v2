version: "3.9"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      APP_PORT: 3000
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: saas_pos
      JWT_SECRET: change_this_secret
      JWT_EXPIRES_IN: 4h
      REDIS_URI: redis://redis:6379
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  mongo_data:
